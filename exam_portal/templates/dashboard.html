<!DOCTYPE html>

<html>
<head>

```
<title>Admin Dashboard</title>

<style>

body{
    font-family:Arial,sans-serif;
    padding:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

tr:nth-child(even){
    background:#f9f9f9;
}

.logout{
    float:right;
    text-decoration:none;
    background:red;
    color:white;
    padding:10px 15px;
    border-radius:5px;
}

</style>
```

</head>

<body>

<a href="/admin/logout" class="logout">
Logout
</a>

<h1>Payment Dashboard</h1>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Telegram</th>
    <th>Amount</th>
    <th>Payment ID</th>
    <th>Status</th>
    <th>Date</th>
</tr>

{% for p in payments %}

<tr>

```
<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>₹{{ p[4] }}</td>
<td>{{ p[5] }}</td>
<td>{{ p[7] }}</td>
<td>{{ p[8] }}</td>
```

</tr>

{% endfor %}

</table>

</body>
</html>
