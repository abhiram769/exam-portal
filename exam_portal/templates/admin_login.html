<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );
}

.login-card{

    width:420px;

    max-width:90%;

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:0 15px 35px rgba(0,0,0,.15);

    text-align:center;
}

.logo{

    font-size:60px;

    margin-bottom:15px;
}

h1{

    color:#1e293b;

    margin-bottom:10px;
}

.subtitle{

    color:#64748b;

    margin-bottom:30px;
}

input{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border:1px solid #dbeafe;

    border-radius:12px;

    font-size:15px;

    outline:none;
}

input:focus{

    border-color:#2563eb;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;
}

button:hover{

    opacity:.95;
}

.home-link{

    display:block;

    margin-top:20px;

    color:#2563eb;

    text-decoration:none;
}

</style>

</head>

<body>

<div class="login-card">

```
<div class="logo">
    🔐
</div>

<h1>Admin Login</h1>

<p class="subtitle">
    Sign in to access the payment dashboard
</p>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Login
    </button>

</form>

<a href="/" class="home-link">
    ← Back to Home
</a>
```

</div>

</body>
</html>
