<!DOCTYPE html>

<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h1>Payment Records</h1>

<a href="/admin/logout">Logout</a>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Telegram</th>
    <th>Amount</th>
    <th>Status</th>
    <th>Date</th>
</tr>

{% for p in payments %}

<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>{{ p[2] }}</td>
    <td>{{ p[3] }}</td>
    <td>₹{{ p[4] }}</td>
    <td>{{ p[5] }}</td>
    <td>{{ p[6] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
